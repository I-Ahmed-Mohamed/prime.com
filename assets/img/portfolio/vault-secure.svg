<!-- Vault Pro Project Card - Placeholder Image -->
<svg width="100%" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="vaultGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4d3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2818;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#vaultGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="350" cy="50" r="40" fill="#00d4ff" opacity="0.15"/>
  <circle cx="50" cy="250" r="50" fill="#00d4ff" opacity="0.1"/>
  
  <!-- Vault icon -->
  <g transform="translate(150, 70)">
    <!-- Vault door -->
    <rect x="40" y="20" width="80" height="120" rx="5" fill="#00d4ff" stroke="#6ee7ff" stroke-width="2"/>
    
    <!-- Dial -->
    <circle cx="80" cy="80" r="25" fill="none" stroke="#6ee7ff" stroke-width="2"/>
    <line x1="80" y1="60" x2="80" y2="50" stroke="#6ee7ff" stroke-width="2"/>
    
    <!-- Security lines -->
    <line x1="50" y1="35" x2="110" y2="35" stroke="#6ee7ff" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="50" x2="110" y2="50" stroke="#6ee7ff" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="110" x2="110" y2="110" stroke="#6ee7ff" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="125" x2="110" y2="125" stroke="#6ee7ff" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="240" font-family="Cairo, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#6ee7ff">
    Vault Pro
  </text>
  
  <text x="200" y="265" font-family="Cairo, sans-serif" font-size="14" text-anchor="middle" fill="#9db2d4">
    Secure Local Archive
  </text>
</svg>
