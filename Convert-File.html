<body>

  <main id="main">
  
    <section id="portfolio">
        <div class="section-title">
          <h2>Convert File</h2>
        </div>
        <div class="container">
            <h3>PDF أو Excel أو Word أضف ملف وقم بتحويلة كـ </h3>

          <input type="file" id="fileUploader" accept="image/*, .pdf, .docx, .xlsx" multiple>
          
          <div class="button-container">
            <button id="downloadPdf"><i class="fas fa-file-pdf"></i> Download as PDF</button>
            <button id="downloadExcel"><i class="fas fa-file-excel"></i> Download as Excel</button>
            <button id="downloadWord"><i class="fas fa-file-word"></i> Download as Word</button>
          </div>
        </div>
      </section>
    
      <script>
        const { jsPDF } = window.jspdf;
        let uploadedFiles = [];
    
        const fileUploader = document.getElementById('fileUploader');
        const downloadPdf = document.getElementById('downloadPdf');
        const downloadExcel = document.getElementById('downloadExcel');
        const downloadWord = document.getElementById('downloadWord');
    
        // عند رفع الملفات
        fileUploader.addEventListener('change', (event) => {
          const files = event.target.files;
          uploadedFiles = [];
          for (let i = 0; i < files.length; i++) {
            uploadedFiles.push(files[i]);
          }
          alert(`${uploadedFiles.length} ملف تم اختياره.`);
        });
    
        // تحويل إلى PDF
        downloadPdf.addEventListener('click', () => {
          if (uploadedFiles.length === 0) {
            alert('من فضلك اختر الملفات أولاً.');
            return;
          }
    
          const pdf = new jsPDF();
          let hasImages = false;
    
          uploadedFiles.forEach((file, index) => {
            if (file.type.startsWith('image/')) {
              hasImages = true;
              const reader = new FileReader();
              reader.onload = function (e) {
                if (index > 0) pdf.addPage();
                pdf.addImage(e.target.result, 'JPEG', 10, 10, 180, 0);
                if (index === uploadedFiles.length - 1) {
                  pdf.save('converted-file.pdf');
                }
              };
              reader.readAsDataURL(file);
            }
          });
    
          if (!hasImages) {
            alert('من فضلك اختر ملفات صور لتحويلها إلى PDF.');
          }
        });
    
        // تحويل إلى Excel
        downloadExcel.addEventListener('click', () => {
          if (uploadedFiles.length === 0) {
            alert('من فضلك اختر الملفات أولاً.');
            return;
          }
    
          const wb = XLSX.utils.book_new();
          const wsData = [['اسم الملف', 'نوع الملف', 'الحجم (KB)']];
    
          uploadedFiles.forEach((file) => {
            wsData.push([file.name, file.type, (file.size / 1024).toFixed(2)]);
          });
    
          const ws = XLSX.utils.aoa_to_sheet(wsData);
          XLSX.utils.book_append_sheet(wb, ws, 'الملفات');
          XLSX.writeFile(wb, 'converted-file.xlsx');
        });
    
        // تحويل إلى Word
        downloadWord.addEventListener('click', () => {
          if (uploadedFiles.length === 0) {
            alert('من فضلك اختر الملفات أولاً.');
            return;
          }
    
          const zip = new PizZip();
          const doc = new window.docxtemplater(zip);
    
          const content = uploadedFiles.map((file, index) => `الملف ${index + 1}: ${file.name}`).join('\n');
    
          doc.loadZip(zip);
          doc.setData({ content });
    
          try {
            doc.render();
            const out = doc.getZip().generate({ type: 'blob' });
            saveAs(out, 'converted-file.docx'); 
          } catch (error) {
            console.error('خطأ في إنشاء ملف Word:', error);
            alert('حدث خطأ أثناء إنشاء ملف Word.');
          }
        });
      </script>
