    <style>
      body {
        background-color: var(--prime-bg);
        color: var(--prime-text);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .designs-header {
        text-align: center;
        padding: 120px 20px 60px;
      }
      .designs-title {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
      }
      .designs-subtitle {
        color: #888;
        font-size: 1.1rem;
        max-width: 600px;
        margin: 0 auto;
      }

      /* Premium Filters */
      .filters-container {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 50px;
        flex-wrap: wrap;
      }
      .filter-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        padding: 12px 25px;
        color: #ccc;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        backdrop-filter: blur(10px);
      }
      .filter-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        transform: translateY(-2px);
      }
      .filter-btn.active {
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        border-color: transparent;
        color: #fff;
        box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
      }
      .filter-icon {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Premium Grid */
      .premium-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
        padding: 0 20px 100px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .design-item {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .design-item:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        border-color: rgba(0, 210, 255, 0.3);
      }
      .design-img-wrapper {
        position: relative;
        padding-top: 75%; /* 4:3 Aspect Ratio */
        overflow: hidden;
      }
      .design-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }
      .design-item:hover .design-img {
        transform: scale(1.05);
      }
      .design-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .design-item:hover .design-overlay {
        opacity: 1;
      }
      .view-icon {
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(5px);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 24px;
        transform: scale(0);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s;
      }
      .design-item:hover .view-icon {
        transform: scale(1);
      }
      .design-info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        transform: translateY(20px);
        opacity: 0;
        transition: all 0.3s ease;
      }
      .design-item:hover .design-info {
        transform: translateY(0);
        opacity: 1;
      }
      .design-company {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .company-mini-logo {
        width: 20px;
        height: 20px;
        border-radius: 50%;
      }
      .company-name {
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        margin: 0;
      }

    </style>

    <!-- Main JS File -->
    <script src="assets/js/navbar.js"></script>

    <script>
      GLightbox({ selector: ".glightbox" });
      AOS.init({ duration: 800, once: true });

      // Filter Logic
      const filterBtns = document.querySelectorAll('.filter-btn');
      const designItems = document.querySelectorAll('.design-item');

      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          // Remove active class
          filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const filterValue = btn.getAttribute('data-filter');

          designItems.forEach(item => {
            if (filterValue === 'all' || item.classList.contains(filterValue)) {
              item.style.display = 'block';
              setTimeout(() => {
                item.style.opacity = '1';
                item.style.transform = 'scale(1)';
              }, 50);
            } else {
              item.style.opacity = '0';
              item.style.transform = 'scale(0.8)';
              setTimeout(() => {
                item.style.display = 'none';
              }, 300);
            }
          });
        });
      });
    </script>
