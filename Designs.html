<!doctype html>
<html lang="ar" dir="rtl" data-lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Design Portfolio | Ahmed Mohamed</title>
    <meta name="description" content="Browse Ahmed Mohamed's professional design portfolio." />
    <meta name="theme-color" content="#037eb8" />
    
    <!-- Favicons -->
    <link href="assets/img/profile/me.jpg" rel="icon" />
    <link href="assets/img/profile/me.jpg" rel="apple-touch-icon" />
    
    <!-- Vendor CSS Files -->
    <link href="assets/vendor/aos/aos.css" rel="stylesheet" />
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet" />
    <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet" />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/designs-portfolio.css" rel="stylesheet" />
    <link href="assets/css/2030-universe.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <main id="main">
      <section id="designs" class="designs-section" style="margin-top: 80px;">
        <div class="container">
          <div class="section-title text-center" data-aos="fade-up">
            <h2>✨ معرض التصميمات</h2>
            <p>🎨 تصاميم احترافية لواجهات المستخدم والهويات البصرية</p>
          </div>

          <!-- Filter Buttons -->
          <div class="filter-buttons text-center mb-5" data-aos="fade-up" data-aos-delay="100">
            <button class="filter-btn active" data-filter="all">
              <i class="bx bx-layout"></i>
              <span>الكل</span>
            </button>
            <button class="filter-btn" data-filter="oval-foods">
              <i class="bx bx-building"></i>
              <span>Oval Foods</span>
            </button>
            <button class="filter-btn" data-filter="al-sharq">
              <i class="bx bx-building"></i>
              <span>الشرق للأعلاف</span>
            </button>
          </div>

          <div class="companies-container">
            <!-- Company 1: Oval Foods -->
            <div class="company-section" data-company="oval-foods" data-aos="fade-up">
              <div class="company-header d-flex align-items-center mb-4">
                <div class="company-badge me-3">
                  <img src="assets/img/oval/logo.jpeg" alt="Oval Foods Logo" class="company-logo rounded-circle" style="width:50px; height:50px; object-fit:cover;" />
                </div>
                <div class="company-info ms-3">
                  <h3 class="m-0">Oval Foods</h3>
                  <p class="company-category text-muted m-0">تصميم وتطوير العلامة التجارية</p>
                </div>
              </div>

              <div class="row g-4 designs-grid">
                <!-- Oval Designs -->
                <div class="col-lg-4 col-md-6 design-card" data-company="oval-foods">
                  <div class="design-image-wrapper">
                    <a href="assets/img/oval/oval-1.jpeg" class="glightbox">
                      <img src="assets/img/oval/oval-1.jpeg" class="img-fluid rounded shadow-sm" alt="Oval Design 1" />
                    </a>
                  </div>
                </div>
                <div class="col-lg-4 col-md-6 design-card" data-company="oval-foods">
                  <div class="design-image-wrapper">
                    <a href="assets/img/oval/oval-2.jpeg" class="glightbox">
                      <img src="assets/img/oval/oval-2.jpeg" class="img-fluid rounded shadow-sm" alt="Oval Design 2" />
                    </a>
                  </div>
                </div>
                <div class="col-lg-4 col-md-6 design-card" data-company="oval-foods">
                  <div class="design-image-wrapper">
                    <a href="assets/img/oval/oval-3.jpeg" class="glightbox">
                      <img src="assets/img/oval/oval-3.jpeg" class="img-fluid rounded shadow-sm" alt="Oval Design 3" />
                    </a>
                  </div>
                </div>
                <div class="col-lg-4 col-md-6 design-card" data-company="oval-foods">
                  <div class="design-image-wrapper">
                    <a href="assets/img/oval/oval-4.jpeg" class="glightbox">
                      <img src="assets/img/oval/oval-4.jpeg" class="img-fluid rounded shadow-sm" alt="Oval Design 4" />
                    </a>
                  </div>
                </div>
              </div>
            </div>

            <hr class="my-5" />

            <!-- Company 2: الشرق للأعلاف -->
            <div class="company-section" data-company="al-sharq" data-aos="fade-up" data-aos-delay="100">
              <div class="company-header d-flex align-items-center mb-4">
                <div class="company-badge me-3">
                  <img src="assets/img/alshark/logo.jpeg" alt="الشرق للأعلاف Logo" class="company-logo rounded-circle" style="width:50px; height:50px; object-fit:cover;" />
                </div>
                <div class="company-info ms-3">
                  <h3 class="m-0">الشرق للأعلاف</h3>
                  <p class="company-category text-muted m-0">صناعة الأعلاف والإنتاج الداجني</p>
                </div>
              </div>

              <div class="row g-4 designs-grid">
                <!-- Al-Sharq Designs -->
                <div class="col-lg-4 col-md-6 design-card" data-company="al-sharq">
                  <div class="design-image-wrapper">
                    <a href="assets/img/alshark/alshark-1.jpeg" class="glightbox">
                      <img src="assets/img/alshark/alshark-1.jpeg" class="img-fluid rounded shadow-sm" alt="Al-Sharq Design 1" />
                    </a>
                  </div>
                </div>
                <div class="col-lg-4 col-md-6 design-card" data-company="al-sharq">
                  <div class="design-image-wrapper">
                    <a href="assets/img/alshark/alshark-2.jpeg" class="glightbox">
                      <img src="assets/img/alshark/alshark-2.jpeg" class="img-fluid rounded shadow-sm" alt="Al-Sharq Design 2" />
                    </a>
                  </div>
                </div>
                <div class="col-lg-4 col-md-6 design-card" data-company="al-sharq">
                  <div class="design-image-wrapper">
                    <a href="assets/img/alshark/alshark-3.jpeg" class="glightbox">
                      <img src="assets/img/alshark/alshark-3.jpeg" class="img-fluid rounded shadow-sm" alt="Al-Sharq Design 3" />
                    </a>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- Vendor JS Files -->
    <script src="assets/vendor/aos/aos.js"></script>
    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>

    <!-- Main JS File -->
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/designs-portfolio.js"></script>

    <script>
      GLightbox({ selector: ".glightbox" });
      AOS.init({ duration: 1000, once: true });
    </script>
  </body>
</html>
