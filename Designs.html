<!doctype html>
<html lang="ar" dir="rtl" data-lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>معرض التصميمات | Ahmed Mohamed</title>
    <meta name="theme-color" content="#1a1a1a" />
    
    <!-- Favicons -->
    <link href="assets/img/profile/me.jpg" rel="icon" />
    
    <!-- CSS -->
    <link href="assets/vendor/aos/aos.css" rel="stylesheet" />
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet" />
    <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet" />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/2030-universe.css" rel="stylesheet" />

    <style>
      body {
        background-color: var(--prime-bg);
        color: var(--prime-text);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .designs-header {
        position: relative;
        text-align: center;
        padding: 160px 20px 80px;
        background: radial-gradient(circle at center, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
        overflow: hidden;
      }
      .designs-header::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 300px;
        background: #00d2ff;
        filter: blur(150px);
        opacity: 0.15;
        z-index: -1;
        border-radius: 50%;
      }
      .badge-premium {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 210, 255, 0.3);
        padding: 8px 20px;
        border-radius: 50px;
        font-size: 14px;
        color: #00d2ff;
        margin-bottom: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
      }
      .designs-title {
        font-size: 3.5rem;
        font-weight: 900;
        background: linear-gradient(to right, #ffffff 20%, #00d2ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
        letter-spacing: -1px;
      }
      .designs-subtitle {
        color: #a0a0a0;
        font-size: 1.2rem;
        max-width: 600px;
        margin: 0 auto;
        line-height: 1.6;
      }
      @media (max-width: 768px) {
        .designs-header {
          padding: 120px 20px 60px;
        }
        .designs-title {
          font-size: 2.5rem;
        }
        .designs-subtitle {
          font-size: 1rem;
        }
      }

      /* Premium Filters */
      .filters-container {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 50px;
        flex-wrap: wrap;
      }
      .filter-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 30px;
        padding: 12px 25px;
        color: #ccc;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        backdrop-filter: blur(10px);
      }
      .filter-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        transform: translateY(-2px);
      }
      .filter-btn.active {
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        border-color: transparent;
        color: #fff;
        box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
      }
      .filter-icon {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Premium Grid */
      .premium-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
        padding: 0 20px 100px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .design-item {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .design-item:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        border-color: rgba(0, 210, 255, 0.3);
      }
      .design-img-wrapper {
        position: relative;
        padding-top: 75%; /* 4:3 Aspect Ratio */
        overflow: hidden;
      }
      .design-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }
      .design-item:hover .design-img {
        transform: scale(1.05);
      }
      .design-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .design-item:hover .design-overlay {
        opacity: 1;
      }
      .view-icon {
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(5px);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 24px;
        transform: scale(0);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s;
      }
      .design-item:hover .view-icon {
        transform: scale(1);
      }
      .design-info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        transform: translateY(20px);
        opacity: 0;
        transition: all 0.3s ease;
      }
      .design-item:hover .design-info {
        transform: translateY(0);
        opacity: 1;
      }

      /* New Client Profiles View */
      .clients-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
        padding: 0 20px 100px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .client-card {
        background: var(--prime-card);
        border: 1px solid var(--prime-line);
        border-radius: 24px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: 0.4s ease;
        text-decoration: none !important;
        color: var(--prime-text) !important;
        display: block;
      }
      .client-card:hover {
        transform: translateY(-10px);
        border-color: var(--prime-accent);
        box-shadow: 0 15px 30px rgba(0, 210, 255, 0.15);
      }
      .client-logo-wrapper {
        width: 100px;
        height: 100px;
        margin: 0 auto 20px;
        border-radius: 50%;
        padding: 5px;
        background: linear-gradient(135deg, var(--prime-accent), var(--prime-accent-2));
      }
      .client-logo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid var(--prime-bg);
      }
      .client-name {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 5px;
      }
      .client-desc {
        color: var(--prime-muted);
        font-size: 14px;
      }

      /* Gallery View */
      #gallery-view {
        display: none;
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff;
        padding: 10px 20px;
        border-radius: 99px;
        cursor: pointer;
        margin-bottom: 30px;
        font-weight: 600;
        transition: 0.3s;
      }
      .back-btn:hover {
        background: rgba(255,255,255,0.1);
        transform: translateX(-5px);
      }
      .client-gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 0 20px 100px;
        max-width: 1200px;
        margin: 0 auto;
      }
      @media (max-width: 992px) {
        .client-gallery-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }
        @media (max-width: 576px) {
          .client-gallery-grid {
            grid-template-columns: repeat(3, 1fr);
            gap: 4px; /* smaller gap on mobile so images fit better */
            padding: 0 4px 100px;
          }
        }

    </style>
  </head>
  <body>
    <!-- Ultimate Preloader -->
    <div id="prime-preloader">
      <div class="preloader-content">
        <div class="loader-logo">
          <img src="assets/img/profile/me.jpg" alt="Ahmed" />
        </div>
        <div class="loader-bar-container">
          <div class="loader-bar"></div>
        </div>
        <div class="loader-text">Ahmed Mohamed</div>
      </div>
    </div>
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <main id="main">
      <div class="designs-header" data-aos="fade-down">
        <div class="badge-premium">
          <i class='bx bxs-magic-wand'></i> أفكار إبداعية، تصميمات ذكية
        </div>
        <h1 class="designs-title">معرض التصميمات</h1>
        <p class="designs-subtitle">تشكيلة من أفضل أعمالي في مجال تصميم واجهات المستخدم والهويات البصرية، مصممة بعناية لتناسب هويتك وتلفت الأنظار.</p>
      </div>

      <!-- Clients View -->
      <div id="clients-view">
        <div class="clients-grid" data-aos="fade-up" data-aos-delay="100">
          
          <div class="client-card" onclick="openClient('oval-foods')">
            <div class="client-logo-wrapper">
              <img src="assets/img/oval/logo.jpeg" class="client-logo" alt="Oval Foods" />
            </div>
            <h3 class="client-name">Oval Foods</h3>
            <p class="client-desc">أعمال تصميم الهوية والتعبئة</p>
          </div>

          <div class="client-card" onclick="openClient('al-sharq')">
            <div class="client-logo-wrapper">
              <img src="assets/img/alshark/alshark-1.jpeg" class="client-logo" alt="الشرق للأعلاف" />
            </div>
            <h3 class="client-name">الشرق للأعلاف</h3>
            <p class="client-desc">تصاميم السوشيال ميديا والإعلانات</p>
          </div>

        </div>
      </div>

      <!-- Gallery View -->
      <div id="gallery-view">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
          <button class="back-btn" onclick="closeClient()"><i class="bx bx-arrow-back"></i> رجوع للعملاء</button>
          <h2 id="gallery-title" style="margin-bottom: 30px; font-weight: 800;">اسم العميل</h2>
        </div>
        
        <div class="client-gallery-grid" id="designs-grid">
          <!-- Images will be injected here via JS -->
        </div>
      </div>

    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- Vendor JS Files -->
    <script src="assets/vendor/aos/aos.js"></script>
    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/glightbox/js/glightbox.min.js"></script>

    <!-- Main JS File -->
    <script src="assets/js/navbar.js"></script>

    <script>
      AOS.init({ duration: 800, once: true });
      let lightbox = GLightbox({ selector: '.glightbox' });

      const clientsData = {
        'oval-foods': {
          name: 'Oval Foods',
          images: [
            'assets/img/oval/oval-1.jpeg',
            'assets/img/oval/oval-2.jpeg',
            'assets/img/oval/oval-3.jpeg',
            'assets/img/oval/oval-4.jpeg',
            'assets/img/oval/oval-5.png',
            'assets/img/oval/oval-6.png',
            'assets/img/oval/oval-7.png',
            'assets/img/oval/oval-8.png',
            'assets/img/oval/oval-9.png',
            'assets/img/oval/oval-10.png',
            'assets/img/oval/oval-11.png',
            'assets/img/oval/oval-12.png',
            'assets/img/oval/oval-13.png',
            'assets/img/oval/oval-14.png',
            'assets/img/oval/oval-15.png',
            'assets/img/oval/oval-16.jpeg',
            'assets/img/oval/oval-17.jpeg',
            'assets/img/oval/oval-18.jpeg',
            'assets/img/oval/oval-19.jpeg',
            'assets/img/oval/oval-20.jpeg'
          ]
        },
        'al-sharq': {
          name: 'الشرق للأعلاف',
          images: [
            'assets/img/alshark/alshark-1.jpeg',
            'assets/img/alshark/alshark-2.jpeg',
            'assets/img/alshark/alshark-3.jpeg'
          ]
        }
      };

      function openClient(clientId) {
        const client = clientsData[clientId];
        if(!client) return;

        document.getElementById('gallery-title').innerText = client.name;
        
        const grid = document.getElementById('designs-grid');
        grid.innerHTML = '';
        
        client.images.forEach((imgSrc, index) => {
          const delay = (index % 3) * 100; // staggered animation
          const html = `
            <div class="design-item" data-aos="fade-up" data-aos-delay="${delay}">
              <a href="${imgSrc}" class="glightbox">
                <div class="design-img-wrapper">
                  <img src="${imgSrc}" class="design-img" alt="${client.name} Design" />
                  <div class="design-overlay">
                    <div class="view-icon"><i class="bx bx-search"></i></div>
                  </div>
                </div>
              </a>
            </div>
          `;
          grid.innerHTML += html;
        });

        // Re-initialize GLightbox for new elements
        lightbox.destroy();
        lightbox = GLightbox({ selector: '.glightbox' });

        // Transition views
        document.getElementById('clients-view').style.display = 'none';
        document.getElementById('gallery-view').style.display = 'block';
        
        // Slight delay to allow display:block to apply before opacity transition
        setTimeout(() => {
          document.getElementById('gallery-view').style.opacity = '1';
          AOS.refresh(); // Refresh animations for newly added elements
        }, 50);
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function closeClient() {
        document.getElementById('gallery-view').style.opacity = '0';
        
        setTimeout(() => {
          document.getElementById('gallery-view').style.display = 'none';
          document.getElementById('clients-view').style.display = 'block';
          AOS.refresh();
        }, 500); // match CSS transition duration
      }
    </script>
  </body>
</html>
