<!doctype html>
<html lang="en" data-theme="dark" data-lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Ahmed Mohamed AI Assistant</title>
    <meta name="description" content="Ahmed Mohamed smart assistant for websites, design, page management, AI videos, and digital services." />
    <meta name="theme-color" content="#037eb8" />
    <link href="assets/img/me.jpg" rel="icon" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700,800|Raleway:400,700,800,900|Poppins:300,400,600,700,800,900" rel="stylesheet" />
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet" />
    <link href="assets/css/style.css" rel="stylesheet" />
    <link href="assets/css/modern-enhancements.css" rel="stylesheet" />
    <link href="assets/css/view.css" rel="stylesheet" />
    <link href="assets/css/ai-assistant.css" rel="stylesheet" />
    <link href="assets/css/ai-mobile.css" rel="stylesheet" />
    <link href="assets/css/2026-effects.css" rel="stylesheet" />
    <link href="assets/css/2030-universe.css" rel="stylesheet" />
  </head>
  <body class="prime-ai-page">
    <div class="scroll-progress"><div class="progress-bar" id="progressBar"></div></div>
    <a href="#" class="back-to-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
    <i class="bi bi-list mobile-nav-toggle d-xl-none"></i>
    <div id="navbar-container"></div>

    <main id="main">
      <section class="ai-page-wrap" aria-label="Ahmed Mohamed AI assistant page">
        <aside class="ai-page-card">
          <span class="prime-kicker"><i class="bi bi-stars"></i> Ahmed AI Studio</span>
          <h1>اسأل المساعد كأنك بتكلم أحمد</h1>
          <p>
            الصفحة دي مخصوص للمساعد الذكي، عشان يرد على الزائر من غير ما يغطي محتوى باقي الصفحات. اسأله عن موقع، تصميم، إدارة صفحة، فيديو AI، أو طريقة التواصل.
          </p>
          <div class="ai-page-prompts">
            <button type="button" data-ai-prompt="عاوز موقع لشركتي">عاوز موقع</button>
            <button type="button" data-ai-prompt="ايه خدمات التصميم وإدارة الصفحات؟">تصميم وصفحات</button>
            <button type="button" data-ai-prompt="عاوز فيديو بالذكاء الاصطناعي">فيديو AI</button>
            <button type="button" data-ai-prompt="ازاي أتواصل معاك؟">تواصل</button>
          </div>
        </aside>

        <section class="ai-page-chat">
          <div class="ai-page-head">
            <div class="ai-page-avatar"><i class="bi bi-cpu"></i></div>
            <div>
              <strong>Ahmed AI</strong>
              <small>بيتكلم بأسلوب أحمد محمد</small>
            </div>
          </div>
          <div class="ai-page-messages" id="ai-page-messages"></div>
          <form class="ai-page-form" id="ai-page-form">
            <textarea id="ai-page-input" rows="1" placeholder="اكتب طلبك هنا... مثال: عاوز موقع لشركتي"></textarea>
            <button type="submit" aria-label="Send"><i class="bi bi-send-fill"></i></button>
          </form>
        </section>
      </section>
    </main>

    <div id="footer-container"></div>

    <script src="assets/js/backend.js"></script>
    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/modern-features.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/view.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/animation.js"></script>
    <script src="assets/js/ai-config.js"></script>
    <script src="assets/js/ai-assistant.js"></script>
    <script src="assets/js/2026-features.js"></script>
    <script src="assets/js/2030-universe.js"></script>
    <script>
      (function () {
        const persona = {
          phone1: '01094547599',
          phone2: '01044599911',
          email: 'ahmedcodteng@gmail.com',
          services: 'مواقع، بورتفوليو، داشبوردات، أنظمة إدارة، تصميم بوستات، إدارة صفحات، كابشنات، أفكار إعلانات، فيديوهات AI، وبرومبتات احترافية',
          stack: 'Full Stack .NET، Angular، HTML، CSS، JavaScript، TypeScript، SQL Server، Entity Framework، Bootstrap، Photoshop، وأدوات الذكاء الاصطناعي'
        };
        const messages = document.getElementById('ai-page-messages');
        const input = document.getElementById('ai-page-input');
        const form = document.getElementById('ai-page-form');
        const add = (html, type='bot') => {
          const div = document.createElement('div');
          div.className = 'ai-page-msg ' + type;
          div.innerHTML = html;
          messages.appendChild(div);
          messages.scrollTop = messages.scrollHeight;
        };
        const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        function reply(q) {
          const t = q.toLowerCase();
          const contact = `<br><br><b>تواصل مباشر:</b><br><a href="tel:+2${persona.phone1}" style="color:var(--prime-accent);font-weight:900">${persona.phone1}</a> - <a href="tel:+2${persona.phone2}" style="color:var(--prime-accent);font-weight:900">${persona.phone2}</a>`;
          if (/موقع|ويب|website|site|landing|شركة/.test(t)) return `تمام يا فندم، أقدر أعملك موقع رايق ومنظم لشركتك: واجهة عالمية، موبايل فريندلي، سرعة كويسة، صفحات خدمات وتواصل، ولو محتاج نضيف AI للزوار نعمله بشكل شيك. <a href="Services.html" style="color:var(--prime-accent);font-weight:900">شوف الخدمات</a>${contact}`;
          if (/تصميم|بوست|صفحات|سوشيال|ادارة|إدارة|photoshop|brand/.test(t)) return `أقدر أظبطلك شكل البراند على السوشيال: بوستات، كابشنات، أفكار إعلانات، تنظيم الصفحة، وهوية بصرية تخلي الشغل يبان محترف. <a href="Designs.html" style="color:var(--prime-accent);font-weight:900">شوف التصميمات</a>${contact}`;
          if (/فيديو|ريل|reel|ai|ذكاء|برومبت|motion/.test(t)) return `أقدر أطلعلك أفكار فيديوهات AI وبرومبتات قوية ومشاهد منظمة، سواء إعلان، ريل، أو فيديو تعريفي لشغلك. <a href="Videos.html" style="color:var(--prime-accent);font-weight:900">افتح الفيديوهات</a>${contact}`;
          if (/مهارات|برمجة|angular|dotnet|\.net|sql|backend|frontend/.test(t)) return `أنا شغال بـ ${persona.stack}. أقدر أبني واجهات، باك إند، داشبوردات، وأنظمة عملية للشركات. <a href="Skills.html" style="color:var(--prime-accent);font-weight:900">افتح المهارات</a>`;
          if (/مشاريع|portfolio|project|اعمال|أعمال|شغل/.test(t)) return `شوف صفحة المشاريع، هتلاقي نماذج شغل ومواقع وأنظمة وتصميمات. <a href="Projects.html" style="color:var(--prime-accent);font-weight:900">افتح المشاريع</a>`;
          if (/سعر|تكلفة|كام|price|cost/.test(t)) return `الأسعار بتتحدد حسب المطلوب، لكن كبداية: الموقع التعريفي يبدأ من 5000 جنيه حسب التفاصيل، وإدارة الصفحات الشهرية تبدأ من 2000 جنيه حسب حجم الشغل.${contact}`;
          if (/تواصل|رقم|واتساب|call|phone|contact/.test(t)) return `تقدر تكلمني مباشرة على:<br><a href="tel:+2${persona.phone1}" style="color:var(--prime-accent);font-weight:900">${persona.phone1}</a><br><a href="tel:+2${persona.phone2}" style="color:var(--prime-accent);font-weight:900">${persona.phone2}</a><br>أو افتح صفحة التواصل: <a href="Contact.html" style="color:var(--prime-accent);font-weight:900">Contact</a>`;
          return `أنا أحمد محمد، أقدر أساعدك في ${persona.services}. اكتبلي محتاج إيه بالظبط وأنا أوجهك لأفضل حل.${contact}`;
        }
        function ask(q) {
          const text = (q || '').trim();
          if (!text) return;
          add(esc(text), 'user');
          setTimeout(() => add(reply(text)), 180);
        }
        form.addEventListener('submit', e => { e.preventDefault(); ask(input.value); input.value = ''; input.style.height = 'auto'; });
        input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 130) + 'px'; });
        document.querySelectorAll('[data-ai-prompt]').forEach(btn => btn.addEventListener('click', () => ask(btn.dataset.aiPrompt)));
        window.AhmedAIPage = { ask };
        add('أهلاً بيك 👋 أنا مساعد أحمد محمد. اسألني عن موقع، تصميم، إدارة صفحات، فيديو AI، الأسعار، أو التواصل.');
        const q = new URLSearchParams(location.search).get('q');
        if (q) setTimeout(() => ask(q), 250);
      })();
    </script>
  </body>
</html>
