<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark" data-lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>المساعد الذكي | Ahmed Mohamed</title>
    <meta name="theme-color" content="#037eb8" />
    <link href="assets/img/profile/me.jpg" rel="icon" />

    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700,800|Raleway:400,700,800,900|Poppins:300,400,600,700,800,900" rel="stylesheet" />
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet" />
    
    <!-- Minimal Base CSS -->
    <style>
      :root {
        --claude-bg: #ffffff;
        --claude-text: #111111;
        --claude-surface: #f4f4f5;
        --claude-border: #e4e4e7;
        --claude-user-bg: #f4f4f5;
        --claude-bot-bg: transparent;
        --claude-font: 'Cairo', 'Inter', system-ui, sans-serif;
      }
      :root[data-theme="dark"] {
        --claude-bg: #09090b;
        --claude-text: #ececf1;
        --claude-surface: #18181b;
        --claude-border: #27272a;
        --claude-user-bg: #27272a;
        --claude-bot-bg: transparent;
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: var(--claude-bg);
        color: var(--claude-text);
        font-family: var(--claude-font);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* Navbar */
      .claude-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        background: transparent;
        z-index: 100;
      }
      .claude-nav a {
        color: var(--claude-text);
        text-decoration: none;
        font-weight: 700;
        font-size: 18px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .claude-nav .theme-toggle {
        background: transparent;
        border: none;
        color: var(--claude-text);
        font-size: 20px;
        cursor: pointer;
      }

      /* Chat Container */
      .claude-chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        scroll-behavior: smooth;
      }
      
      .claude-messages-wrapper {
        width: 100%;
        max-width: 768px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding-bottom: 20px;
      }

      .claude-msg {
        display: flex;
        gap: 16px;
        width: 100%;
        line-height: 1.6;
        font-size: 16px;
      }

      .claude-msg.user {
        flex-direction: row-reverse;
      }
      .claude-msg.user .msg-content {
        background: var(--claude-user-bg);
        padding: 12px 16px;
        border-radius: 16px;
        border-top-left-radius: 4px;
        max-width: 85%;
      }
      :root[dir="ltr"] .claude-msg.user .msg-content {
        border-top-left-radius: 16px;
        border-top-right-radius: 4px;
      }

      .claude-msg.bot .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        background: linear-gradient(135deg, #d8b4fe, #818cf8);
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 18px;
        flex-shrink: 0;
      }

      .claude-msg.bot .msg-content {
        padding: 4px 0;
        max-width: 85%;
      }

      /* Input Area */
      .claude-input-container {
        width: 100%;
        padding: 0 20px 24px;
        display: flex;
        justify-content: center;
        background: linear-gradient(to top, var(--claude-bg) 70%, transparent);
      }
      
      .claude-input-wrapper {
        width: 100%;
        max-width: 768px;
        position: relative;
        background: var(--claude-surface);
        border: 1px solid var(--claude-border);
        border-radius: 16px;
        padding: 12px 16px;
        box-shadow: 0 4px 16px rgba(0,0,0,.05);
        display: flex;
        align-items: flex-end;
        gap: 10px;
      }
      
      .claude-input-wrapper textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--claude-text);
        font-family: inherit;
        font-size: 16px;
        resize: none;
        outline: none;
        max-height: 200px;
        padding: 4px 0;
        line-height: 1.5;
      }
      
      .claude-input-wrapper button {
        background: var(--claude-text);
        color: var(--claude-bg);
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: 0.2s;
        flex-shrink: 0;
      }
      .claude-input-wrapper button:hover {
        opacity: 0.8;
      }
      
      /* Welcome Screen */
      .claude-welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        margin-top: 40px;
        margin-bottom: 40px;
      }
      .claude-welcome h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 24px;
      }
      .claude-prompts {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        max-width: 600px;
      }
      .claude-prompts button {
        background: var(--claude-surface);
        border: 1px solid var(--claude-border);
        color: var(--claude-text);
        padding: 10px 16px;
        border-radius: 12px;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
      }
      .claude-prompts button:hover {
        background: var(--claude-border);
      }
      
      /* Global links inside messages */
      .msg-content a {
        color: #818cf8;
        font-weight: 600;
        text-decoration: none;
      }
      .msg-content a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    
    <div class="claude-nav">
      <a href="index.html"><i class="bi bi-arrow-right"></i> العودة للرئيسية</a>
      <button class="theme-toggle" id="themeToggleBtn"><i class="bi bi-moon-stars"></i></button>
    </div>

    <div class="claude-chat-container" id="chatContainer">
      <div class="claude-messages-wrapper" id="messagesWrapper">
        <div class="claude-welcome" id="welcomeScreen">
          <h1>مرحباً، أنا المساعد الذكي لأحمد.</h1>
          <div class="claude-prompts">
            <button data-ai-prompt="عاوز موقع تعريفي">موقع تعريفي</button>
            <button data-ai-prompt="تفاصيل خدمة إدارة الصفحات">إدارة الصفحات</button>
            <button data-ai-prompt="عاوز فيديو بالذكاء الاصطناعي">فيديو AI</button>
            <button data-ai-prompt="أسعار خدماتك ايه؟">الأسعار</button>
          </div>
        </div>
      </div>
    </div>

    <div class="claude-input-container">
      <form class="claude-input-wrapper" id="chatForm">
        <textarea id="chatInput" rows="1" placeholder="اكتب رسالتك هنا..."></textarea>
        <button type="submit" aria-label="Send"><i class="bi bi-arrow-up"></i></button>
      </form>
    </div>

    <script>
      (function () {
        // Theme toggle logic
        const themeBtn = document.getElementById('themeToggleBtn');
        const root = document.documentElement;
        
        // Load saved theme
        const savedTheme = localStorage.getItem('prime-theme') || 'dark';
        root.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeBtn.addEventListener('click', () => {
          const currentTheme = root.getAttribute('data-theme');
          const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', newTheme);
          localStorage.setItem('prime-theme', newTheme);
          updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
          themeBtn.innerHTML = theme === 'dark' ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
        }

        // AI Chat Logic
        const persona = {
          phone1: '01094547599',
          phone2: '01044599911',
          email: 'ahmedcodteng@gmail.com',
          services: 'تصميم وبناء مواقع للشركات، إدارة صفحات السوشيال ميديا، فيديوهات AI، وبرمجة تطبيقات خاصة',
          stack: 'Full Stack .NET, Angular, HTML, CSS, JavaScript, TypeScript, SQL Server, Entity Framework, Bootstrap'
        };
        
        const messagesWrapper = document.getElementById('messagesWrapper');
        const input = document.getElementById('chatInput');
        const form = document.getElementById('chatForm');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const chatContainer = document.getElementById('chatContainer');
        
        let isFirstMessage = true;

        const addMessage = (html, type='bot') => {
          if (isFirstMessage) {
            welcomeScreen.style.display = 'none';
            isFirstMessage = false;
          }

          const div = document.createElement('div');
          div.className = 'claude-msg ' + type;
          
          if (type === 'bot') {
            div.innerHTML = `
              <div class="msg-avatar"><i class="bi bi-stars"></i></div>
              <div class="msg-content">${html}</div>
            `;
          } else {
            div.innerHTML = `<div class="msg-content">${html}</div>`;
          }
          
          messagesWrapper.appendChild(div);
          chatContainer.scrollTop = chatContainer.scrollHeight;
        };
        
        const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        
        function reply(q) {
          const t = q.toLowerCase();
          const contact = `<br><br><b>للتواصل المباشر:</b><br><a href="tel:+2${persona.phone1}">${persona.phone1}</a> - <a href="tel:+2${persona.phone2}">${persona.phone2}</a>`;
          
          if (/موقع|ويب|website|site|landing|تعريفي/.test(t)) return `أقدر أصمم وأبرمج موقع كامل لشركتك، بتصميم عصري ومتجاوب مع جميع الشاشات، ويكون سريع جداً وبأحدث التقنيات. <a href="Services.html">تصفح الخدمات</a>${contact}`;
          if (/تصميم|سوشيال|صفحات|سوشيال ميديا|إدارة صفحات|photoshop|brand/.test(t)) return `بقدم خدمة إدارة كاملة لصفحات السوشيال ميديا: تصاميم احترافية، كتابة محتوى تسويقي، ونشر منتظم عشان نكبر نشاطك. <a href="Designs.html">تصفح التصميمات</a>${contact}`;
          if (/فيديو|ريلز|reel|ai|ذكاء|مونتاج|motion/.test(t)) return `بقدم خدمة إنتاج فيديوهات AI ومونتاج احترافي للريلز والاعلانات، بتجذب الانتباه وتزود تفاعل عملائك. <a href="Videos.html">شاهد الفيديوهات</a>${contact}`;
          if (/مهارات|تقنيات|angular|dotnet|\.net|sql|backend|frontend/.test(t)) return `أنا بشتغل بـ ${persona.stack}. أقدر أبني واجهات للمستخدم (Frontend) وأنظمة إدارة (Backend) متكاملة وقوية. <a href="Skills.html">تصفح المهارات</a>`;
          if (/مشاريع|portfolio|project|اعمال|أعمال|شغل/.test(t)) return `تقدر تشوف المشاريع السابقة، هتلاقي نماذج شغل ومواقع وأنظمة. <a href="Projects.html">تصفح المشاريع</a>`;
          if (/سعر|تكلفة|كام|price|cost/.test(t)) return `الأسعار بتختلف حسب المتطلبات. بشكل مبدئي: الموقع التعريفي يبدأ من 5000 جنيه، وإدارة الصفحات (باقات شهرية) تبدأ من 2000 جنيه.${contact}`;
          if (/تواصل|رقم|واتساب|call|phone|contact/.test(t)) return `أكيد، تواصل معايا في أي وقت على الأرقام دي:<br><a href="tel:+2${persona.phone1}">${persona.phone1}</a><br><a href="tel:+2${persona.phone2}">${persona.phone2}</a>`;
          
          return `أنا جاهز أرد على استفسارك عن ${persona.services}. ممكن توضحلي طلبك أكتر عشان أقدر أساعدك بشكل أفضل؟${contact}`;
        }
        
        function ask(q) {
          const text = (q || '').trim();
          if (!text) return;
          addMessage(esc(text), 'user');
          
          // Show typing effect or instant reply (simulated delay)
          setTimeout(() => addMessage(reply(text), 'bot'), 400);
        }
        
        form.addEventListener('submit', e => { 
          e.preventDefault(); 
          ask(input.value); 
          input.value = ''; 
          input.style.height = 'auto'; 
        });
        
        input.addEventListener('input', () => { 
          input.style.height = 'auto'; 
          input.style.height = Math.min(input.scrollHeight, 150) + 'px'; 
        });

        // Allow Shift+Enter for newline, Enter for submit
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            form.dispatchEvent(new Event('submit'));
          }
        });
        
        document.querySelectorAll('[data-ai-prompt]').forEach(btn => btn.addEventListener('click', () => ask(btn.dataset.aiPrompt)));
        
        // Check URL for direct questions
        const urlQ = new URLSearchParams(location.search).get('q');
        if (urlQ) setTimeout(() => ask(urlQ), 300);

      })();
    </script>
  </body>
</html>
