    <style>
      :root {
        --claude-bg: var(--bg-color, #09090b);
        --claude-text: var(--text-colore, #ececf1);
        --claude-surface: var(--prime-surface, #18181b);
        --claude-border: var(--prime-line, #27272a);
        --claude-user-bg: var(--prime-card-strong, #27272a);
        --claude-bot-bg: transparent;
        --claude-font: var(--prime-font, 'Cairo', 'Inter', system-ui, sans-serif);
      }
      
      
      body {
        margin: 0;
        padding: 0;
        background-color: var(--claude-bg);
        color: var(--claude-text);
        font-family: var(--claude-font);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* Chat Container */
      .claude-chat-container { padding-top: 100px;
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        scroll-behavior: smooth;
      }
      
      .claude-messages-wrapper {
        width: 100%;
        max-width: 768px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding-bottom: 20px;
      }

      .claude-msg {
        display: flex;
        gap: 16px;
        width: 100%;
        line-height: 1.6;
        font-size: 16px;
      }

      .claude-msg.user {
        flex-direction: row-reverse;
      }
      .claude-msg.user .msg-content {
        background: var(--claude-user-bg);
        padding: 12px 16px;
        border-radius: 16px;
        border-top-left-radius: 4px;
        max-width: 85%;
      }
      :root[dir="ltr"] .claude-msg.user .msg-content {
        border-top-left-radius: 16px;
        border-top-right-radius: 4px;
      }

      .claude-msg.bot .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        background: linear-gradient(135deg, #d8b4fe, #818cf8);
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 18px;
        flex-shrink: 0;
      }

      .claude-msg.bot .msg-content {
        padding: 4px 0;
        max-width: 85%;
      }

      /* Input Area */
      .claude-input-container {
        width: 100%;
        padding: 0 20px 24px;
        display: flex;
        justify-content: center;
        background: linear-gradient(to top, var(--claude-bg) 70%, transparent);
      }
      
      .claude-input-wrapper {
        width: 100%;
        max-width: 768px;
        position: relative;
        background: var(--claude-surface);
        border: 1px solid var(--claude-border);
        border-radius: 16px;
        padding: 12px 16px;
        box-shadow: 0 4px 16px rgba(0,0,0,.05);
        display: flex;
        align-items: flex-end;
        gap: 10px;
      }
      
      .claude-input-wrapper textarea {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--claude-text);
        font-family: inherit;
        font-size: 16px;
        resize: none;
        outline: none;
        max-height: 200px;
        padding: 4px 0;
        line-height: 1.5;
      }
      
      .claude-input-wrapper button {
        background: var(--claude-text);
        color: var(--claude-bg);
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: 0.2s;
        flex-shrink: 0;
      }
      .claude-input-wrapper button:hover {
        opacity: 0.8;
      }
      
      /* Welcome Screen */
      .claude-welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        margin-top: 40px;
        margin-bottom: 40px;
      }
      .claude-welcome h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 24px;
      }
      .claude-prompts {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        max-width: 600px;
      }
      .claude-prompts button {
        background: var(--claude-surface);
        border: 1px solid var(--claude-border);
        color: var(--claude-text);
        padding: 10px 16px;
        border-radius: 12px;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
      }
      .claude-prompts button:hover {
        background: var(--claude-border);
      }
      
      /* Global links inside messages */
      .msg-content a {
        color: #818cf8;
        font-weight: 600;
        text-decoration: none;
      }
      .msg-content a:hover {
        text-decoration: underline;
      }
    </style>
