          if (/ўЕўЗЎІЎ±ЎІЎ™|Ў™ўВўЖўКЎІЎ™|Ў®Ў±ўЕЎђЎ©|ўДЎЇЎІЎ™|angular|dotnet|\.net|sql|backend|frontend|react|node|javascript/.test(t)) return `Ў£Ў≠ўЕЎѓ Ў®ўКЎіЎ™ЎЇўД Ў®ўАЎ™ўВўЖўКЎІЎ™ ўВўИўКЎ© ЎђЎѓЎІўЛ Ў≤ўК: ${persona.stack}. ўКўВЎѓЎ± ўКЎ®ўЖўК ўИЎІЎђўЗЎІЎ™ Ў£ўЕЎІўЕўКЎ© (Frontend) ўИЎ£ўЖЎЄўЕЎ© Ў•ЎѓЎІЎ±Ў© ЎЃўДўБўКЎ© (Backend) ўЕЎ™ўГЎІўЕўДЎ©. <a href="Skills.html">Ў™ЎµўБЎ≠ ЎІўДўЕўЗЎІЎ±ЎІЎ™ ўГЎІўЕўДЎ©</a>`;
          
          // ЎІўДЎ£ЎєўЕЎІўД ЎІўДЎ≥ЎІЎ®ўВЎ©
          if (/ўЕЎіЎІЎ±ўКЎє|portfolio|project|ЎІЎєўЕЎІўД|Ў£ЎєўЕЎІўД|ЎіЎЇўД|Ў≥ЎІЎ®ўВЎ©/.test(t)) return `Ў£ўГўКЎѓ! Ў™ўВЎѓЎ± Ў™ЎіўИўБ ўЕЎђўЕўИЎєЎ© ўЕўЖ Ў£ўВўИўЙ ЎІўДўЕўИЎІўВЎє ўИЎІўДЎ£ўЖЎЄўЕЎ© ЎІўДўДўК Ў£Ў≠ўЕЎѓ Ў®Ў±ўЕЎђўЗЎІ ўЕўЖ ўЗўЖЎІ: <a href="Projects.html">Ў™ЎµўБЎ≠ ЎІўДўЕЎіЎІЎ±ўКЎє</a>`;
          
          // ЎІўДЎ£Ў≥ЎєЎІЎ±
          if (/Ў≥ЎєЎ±|Ў™ўГўДўБЎ©|ўГЎІўЕ|Ў®ўГЎІўЕ|price|cost|ўБўДўИЎ≥/.test(t)) return `ЎІўДЎ£Ў≥ЎєЎІЎ± ўЕўЕЎ™ЎІЎ≤Ў© ўИЎ®Ў™Ў™Ў≠ЎѓЎѓ Ў≠Ў≥Ў® Ў™ўБЎІЎµўКўД ЎЈўДЎ®ўГ. ўГўЕЎЂЎІўД ўЕЎ®ЎѓЎ¶ўК: ЎІўДўЕўИўВЎє ЎІўДЎ™ЎєЎ±ўКўБўК ўКЎ®ЎѓЎ£ ўЕўЖ 5000 ЎђўЖўКўЗЎМ ўИЎ®ЎІўВЎІЎ™ Ў•ЎѓЎІЎ±Ў© ЎІўДЎ≥ўИЎіўКЎІўД ўЕўКЎѓўКЎІ Ў™Ў®ЎѓЎ£ ўЕўЖ 2000 ЎђўЖўКўЗ. ўГўДўЕўЖЎІ ЎєЎіЎІўЖ ўЖЎЄЎ®ЎЈўДўГ ЎєЎ±Ўґ Ў≥ЎєЎ± ўЕЎЃЎµўИЎµ! ${contact}`;
          
          // ЎІўДЎ™ўИЎІЎµўД
          if (/Ў™ўИЎІЎµўД|Ў±ўВўЕ|ўИЎІЎ™Ў≥ЎІЎ®|ўИЎІЎ™Ў≥|Ў™ўДўКўБўИўЖ|call|phone|contact|whatsapp/.test(t)) return `Ў™ўВЎѓЎ± Ў™Ў™ўИЎІЎµўД ўЕЎє Ў£Ў≠ўЕЎѓ ўЕЎ®ЎІЎіЎ±Ў© ўБўК Ў£ўК ўИўВЎ™ (ўЕўГЎІўДўЕЎ© Ў£ўИ ўИЎІЎ™Ў≥ЎІЎ®) ЎєўДўЙ ЎІўДЎ£Ў±ўВЎІўЕ ЎѓўК:<br><a href="tel:+2${persona.phone1}">${persona.phone1}</a><br><a href="tel:+2${persona.phone2}">${persona.phone2}</a>`;
          
          // ЎІўДўЕЎ≠ЎІЎѓЎЂЎ© ЎІўДЎєЎІўЕЎ©
          if (/ЎіўГЎ±ЎІ|Ў™Ў≥ўДўЕ|Ў≠Ў®ўКЎ®ўК|Ў®ЎІўК|ўЕЎє ЎІўДЎ≥ўДЎІўЕЎ©|thanks/.test(t)) return `ЎІўДЎєўБўИ ўКЎІ ўБўЖЎѓўЕ! Ў£ўЖЎІ ўЕўИЎђўИЎѓ ўЗўЖЎІ ўБўК Ў£ўК ўИўВЎ™ Ў™Ў≠Ў™ЎІЎђўЖўК ўБўКўЗ. ўКўИўЕўГ ЎђўЕўКўД! рЯМЯ`;
          if (/Ў®Ў™Ў≠Ў®|Ў±Ў£ўКўГ|ўГўКўБ|ЎІЎ≤ЎІўК/.test(t)) return `Ў£ўЖЎІ ўЕЎђЎ±Ўѓ ўЕЎ≥ЎІЎєЎѓ Ў∞ўГўК ўЕЎ®Ў±ўЕЎђ ўДўЕЎ≥ЎІЎєЎѓЎ™ўГ ўДўДўИЎµўИўД ўДЎ£ўБЎґўД ЎЃЎѓўЕЎІЎ™ ЎІўДўИўКЎ® ўИЎІўДЎ™ЎµўЕўКўЕ ўЕўЖ ЎІўДўЕўЗўЖЎѓЎ≥ Ў£Ў≠ўЕЎѓ. Ў≥ўКЎ®ўГ ўЕўЖўК ўИЎЃўДўКўЖЎІ ўЖЎ™ўГўДўЕ ЎєўЖ ўЕЎіЎ±ўИЎєўГ! рЯШЙ`;
          
          // ЎІўДЎ±Ўѓ ЎІўДЎІўБЎ™Ў±ЎІЎґўК ЎІўДЎ∞ўГўК
          return `Ў≥Ў§ЎІўД ўЕўЕЎ™ЎІЎ≤! ЎєЎіЎІўЖ Ў£ўВЎѓЎ± Ў£ўБўКЎѓўГ Ў£ўГЎ™Ў± Ў®ЎЃЎµўИЎµ "${esc(t.substring(0, 30))}..." ўКЎІЎ±ўКЎ™ Ў™Ў™ўИЎІЎµўД ўЕЎє ЎІўДўЕўЗўЖЎѓЎ≥ Ў£Ў≠ўЕЎѓ ўЕЎ®ЎІЎіЎ±Ў© ЎєЎіЎІўЖ ўКЎѓЎ±Ў≥ ўБўГЎ±Ў™ўГ ўИўКЎѓўКўДўГ ЎІўДЎ≠ўД ЎІўДЎ™ўВўЖўК ЎІўДўЕЎЄЎ®ўИЎЈ.${contact}`;
        }
        
        function ask(q) {
          const text = (q || '').trim();
          if (!text) return;
          addMessage(esc(text), 'user');
          
          // Typing Indicator
          const msgContent = addMessage('<span style="opacity: 0.7;">ЎђЎІЎ±ўК ЎІўДўГЎ™ЎІЎ®Ў©... вП≥</span>', 'bot');
          
          // Simulated Delay based on text length for realism
          setTimeout(() => {
             const answer = reply(text);
             msgContent.innerHTML = answer;
             chatContainer.scrollTop = chatContainer.scrollHeight;
          }, 800 + Math.random() * 500);
        }
        
        form.addEventListener('submit', e => { 
          e.preventDefault(); 
          ask(input.value); 
          input.value = ''; 
          input.style.height = 'auto'; 
        });
        
        input.addEventListener('input', () => { 
          input.style.height = 'auto'; 
          input.style.height = Math.min(input.scrollHeight, 150) + 'px'; 
        });

        // Allow Shift+Enter for newline, Enter for submit
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            form.dispatchEvent(new Event('submit'));
          }
        });
        
        document.querySelectorAll('[data-ai-prompt]').forEach(btn => btn.addEventListener('click', () => ask(btn.dataset.aiPrompt)));
        
        // Check URL for direct questions
        const urlQ = new URLSearchParams(location.search).get('q');
        if (urlQ) setTimeout(() => ask(urlQ), 300);

      })();
    </script>
  </body>
</html>
