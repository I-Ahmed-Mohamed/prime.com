<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark" data-lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ahmed Mohamed - Visual Marquee</title>
    
    <!-- Favicons -->
    <link href="assets/img/profile/me.jpg" rel="icon" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet" />

    <!-- Vendor CSS -->
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/vendor/boxicons/css/boxicons.min.css" rel="stylesheet" />

    <!-- Template Main CSS File -->
    <link href="assets/css/2030-universe.css" rel="stylesheet" />

    <style>
      /* Marquee Page Styles */
      html, body {
        background: var(--prime-bg);
        overflow: hidden !important; /* Prevent ALL scrolling */
        height: 100vh;
        position: relative;
        width: 100%;
        max-width: 100vw;
      }
      #main {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
      }
      .marquee-header {
        text-align: center;
        padding: 90px 20px 20px; /* Reduced to fit in 100vh */
        position: relative;
        z-index: 10;
        flex-shrink: 0;
      }
      .marquee-header::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 300px;
        background: #00d2ff;
        filter: blur(150px);
        opacity: 0.15;
        z-index: -1;
        border-radius: 50%;
      }
      .badge-premium {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(0, 210, 255, 0.3);
        padding: 8px 20px;
        border-radius: 50px;
        font-size: 14px;
        color: #00d2ff;
        margin-bottom: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
      }
      .marquee-title {
        font-size: 3.5rem;
        font-weight: 900;
        background: linear-gradient(to right, #ffffff 20%, #00d2ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
        letter-spacing: -1px;
      }
      .marquee-subtitle {
        color: #a0a0a0;
        font-size: 1.2rem;
        max-width: 600px;
        margin: 0 auto;
        line-height: 1.6;
      }
      
      .marquee-container {
        display: flex;
        flex-direction: column;
        justify-content: center; /* Center the tracks vertically */
        flex: 1; /* Take remaining height */
        gap: 30px;
        padding: 0 0 60px 0; /* Leave space for bottom navbar */
        width: 100%;
        max-width: 100vw;
        overflow: hidden;
        direction: ltr; /* Force LTR to fix translateX and flex flow bugs */
        position: relative;
        clip-path: inset(0); /* Force strict clipping on iOS */
      }
      
      .marquee-row {
        display: flex;
        gap: 30px;
        white-space: nowrap;
      }
      
      .marquee-track {
        display: flex;
        flex-direction: row;
        gap: 30px;
        width: max-content;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
      }

      .marquee-row.left .marquee-track {
        animation: scroll-left 40s linear infinite;
      }
      .marquee-row.right .marquee-track {
        animation: scroll-right 40s linear infinite;
      }

      /* Hover to pause */
      .marquee-row:hover .marquee-track {
        animation-play-state: paused;
      }

      @keyframes scroll-left {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(-50% - 15px)); }
      }
      @keyframes scroll-right {
        0% { transform: translateX(calc(-50% - 15px)); }
        100% { transform: translateX(0); }
      }

      .marquee-item {
        width: 320px;
        height: 240px;
        border-radius: 20px;
        overflow: hidden;
        flex-shrink: 0;
        position: relative;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: transform 0.4s ease, border-color 0.4s ease;
        cursor: pointer;
      }
      .marquee-item:hover {
        transform: scale(1.05) translateY(-10px);
        border-color: #00d2ff;
        z-index: 10;
        box-shadow: 0 15px 40px rgba(0, 210, 255, 0.2);
      }

      .marquee-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
      }
      .marquee-item:hover .marquee-img {
        transform: scale(1.1);
      }

      @media (max-width: 768px) {
        .marquee-header {
          padding: 80px 20px 10px;
        }
        .marquee-container {
          gap: 15px;
          padding: 0 0 80px 0; /* Space for mobile navbar */
        }
        .marquee-item {
          width: 160px;
          height: 120px;
          border-radius: 12px;
        }
        .marquee-title {
          font-size: 2.2rem;
          margin-bottom: 10px;
        }
        .marquee-subtitle {
          font-size: 1rem;
        }
        .badge-premium {
          margin-bottom: 10px;
          padding: 6px 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Ultimate Preloader -->
    <div id="prime-preloader">
      <div class="preloader-content">
        <div class="loader-logo">
          <img src="assets/img/profile/me.jpg" alt="Ahmed" />
        </div>
        <div class="loader-bar-container">
          <div class="loader-bar"></div>
        </div>
        <div class="loader-text">Ahmed Mohamed</div>
      </div>
    </div>

    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <main id="main">
      <div class="marquee-header" data-aos="fade-down">
        <div class="badge-premium">
          <i class='bx bx-slideshow'></i> رحلة بصرية لا نهائية
        </div>
        <h1 class="marquee-title">شريط الإبداعات 🚀</h1>
        <p class="marquee-subtitle">شاهد جميع تصميماتي في عرض مستمر يجسد الشغف والإبداع اللامحدود.</p>
      </div>

      <div class="marquee-container" id="marquee-container">
        <!-- Rows will be injected by JS -->
      </div>
    </main>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- Vendor JS Files -->
    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/aos/aos.js"></script>

    <!-- Main JS File -->
    <script src="assets/js/navbar.js"></script>

    <script>
      AOS.init({ duration: 800, once: true });
      
      const allImages = [
        'assets/img/oval/oval-1.jpeg', 'assets/img/oval/oval-2.jpeg', 'assets/img/oval/oval-3.jpeg', 'assets/img/oval/oval-4.jpeg', 'assets/img/oval/oval-5.png', 'assets/img/oval/oval-6.png', 'assets/img/oval/oval-7.png', 'assets/img/oval/oval-8.png', 'assets/img/oval/oval-9.png', 'assets/img/oval/oval-10.png', 'assets/img/oval/oval-11.png', 'assets/img/oval/oval-12.png', 'assets/img/oval/oval-13.png', 'assets/img/oval/oval-14.png', 'assets/img/oval/oval-15.png', 'assets/img/oval/oval-16.jpeg', 'assets/img/oval/oval-17.jpeg', 'assets/img/oval/oval-18.jpeg', 'assets/img/oval/oval-19.jpeg', 'assets/img/oval/oval-20.jpeg',
        'assets/img/alshark/alshark-1.jpeg', 'assets/img/alshark/alshark-2.jpeg', 'assets/img/alshark/alshark-3.jpeg', 'assets/img/alshark/logo.jpeg'
      ];

      // Shuffle images to make rows look random
      function shuffle(array) {
        let currentIndex = array.length,  randomIndex;
        while (currentIndex > 0) {
          randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;
          [array[currentIndex], array[randomIndex]] = [
            array[randomIndex], array[currentIndex]];
        }
        return array;
      }

      const shuffled = shuffle([...allImages]);
      
      // Divide into 3 rows
      const third = Math.floor(shuffled.length / 3);
      const row1 = shuffled.slice(0, third);
      const row2 = shuffled.slice(third, third * 2);
      const row3 = shuffled.slice(third * 2);

      const container = document.getElementById('marquee-container');

      function createRow(images, direction, speed) {
        // We duplicate the images array so it loops seamlessly
        const rowHtml = images.map(src => `
          <div class="marquee-item">
            <img src="${src}" class="marquee-img" alt="Design Portfolio" loading="lazy" />
          </div>
        `).join('');

        const wrapper = document.createElement('div');
        wrapper.className = `marquee-row ${direction}`;
        
        // Two tracks for seamless infinite scroll
        wrapper.innerHTML = `
          <div class="marquee-track" style="animation-duration: ${speed}s;">
            ${rowHtml}
            ${rowHtml}
          </div>
        `;
        return wrapper;
      }

      container.appendChild(createRow(row1, 'left', 60));
      container.appendChild(createRow(row2, 'right', 65)); // Slightly different speed
      container.appendChild(createRow(row3, 'left', 55));
    </script>
  </body>
</html>
