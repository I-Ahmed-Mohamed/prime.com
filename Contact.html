    <style>
      .prime-contact-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 140px 20px 40px;
      }
      .contact-card-glass {
        width: min(800px, 100%);
        border-radius: 34px;
        background: var(--prime-card-strong);
        border: 1px solid var(--prime-line);
        box-shadow: var(--prime-shadow);
        backdrop-filter: blur(28px);
        padding: clamp(30px, 5vw, 60px);
        text-align: center;
      }
      .contact-card-glass h1 {
        font-size: clamp(32px, 6vw, 54px);
        margin-bottom: 10px;
        background: linear-gradient(135deg, var(--prime-text), var(--prime-muted));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .contact-card-glass p {
        font-size: 18px;
        line-height: 1.8;
        max-width: 600px;
        margin: 0 auto 40px;
      }
      .contact-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
      }
      .contact-method {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
        border-radius: 24px;
        background: var(--prime-card);
        border: 1px solid var(--prime-line);
        text-decoration: none !important;
        color: var(--prime-text) !important;
        transition: 0.3s ease;
      }
      .contact-method:hover {
        transform: translateY(-5px);
        border-color: var(--prime-accent);
        box-shadow: 0 10px 30px rgba(0,0,0,.15);
      }
      .contact-method i {
        font-size: 42px;
        margin-bottom: 15px;
        background: linear-gradient(135deg, var(--prime-accent), var(--prime-accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .contact-method.fb i {
        background: linear-gradient(135deg, #1877F2, #0e5cbf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .contact-method.wa i {
        background: linear-gradient(135deg, #25D366, #128C7E);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .contact-method strong {
        font-size: 20px;
        display: block;
        margin-bottom: 5px;
      }
      .contact-method span {
        color: var(--prime-muted);
        font-size: 15px;
        direction: ltr;
      }
    </style>
  </head>

          <div class="contact-grid">

              <i class="bx bxl-whatsapp"></i>

              <span>+20 109 454 7599</span>
            </a>
            
            <a href="https://wa.me/201044599911" target="_blank" class="contact-method wa">
              <i class="bx bxl-whatsapp"></i>
              <strong>WhatsApp 2</strong>

            </a>

            <a href="https://www.facebook.com/share/1H9SnNmKau/?mibextid=wwXIfr" target="_blank" class="contact-method fb">
              <i class="bx bxl-facebook-circle"></i>
              <strong>Facebook</strong>
              <span>Ahmed Mohamed</span>
            </a>
            
            <a href="tel:+201094547599" class="contact-method">
              <i class="bx bx-phone-call"></i>
              <strong>مكالمة هاتفية</strong>
              <span>+20 109 454 7599</span>
            </a>
          </div>
        </div>
      </div>
    </main>
